    <meta charset="UTF-8">

    <meta property="og:image" content="http://43.203.237.63/og-image.png">
    <meta property="og:type" content="website">
    <meta property="og:url" content="http://43.203.237.63/">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom Style -->
    <link rel="stylesheet" href="style.css?v=11">
    <link rel="stylesheet" href="board.css">
    <!-- Mobile Responsive Override -->
    <link rel="stylesheet" href="mobile.css?v=1">
</head>
<body class="dark-theme">
    
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="logo" style="text-decoration:none; color:inherit;">
                <i class="fa-solid fa-spa"></i>
                <span>홍삼한방타운 ERP</span>
            </a>
        </div>
        
        <nav class="nav-menu">
            <div class="nav-section">MAIN</div>
            <a href="index.html" class="nav-item">
                <i class="fa-solid fa-chart-pie"></i> 통합 대시보드</a>
            <a href="traffic.html" class="nav-item">
                <i class="fa-solid fa-video"></i> 트래픽 모니터링</a>
            <a href="hr.html" class="nav-item">
                <i class="fa-solid fa-users"></i> HR/근태 관리</a>
            <a href="sales.html" class="nav-item">
                <i class="fa-regular fa-calendar-check"></i> 영업관리</a>
            <a href="inventory.html" class="nav-item">
                <i class="fa-solid fa-box-open"></i> 재고관리</a>
            <a href="facility.html" class="nav-item">
                <i class="fa-solid fa-building"></i> 시설현황</a>
            <a href="simulation.html" class="nav-item">
                <i class="fa-solid fa-chart-bar"></i> 경영시뮬레이션</a>            
            <div class="nav-section">MONITORING & COMM</div>
            <a href="board.html" class="nav-item active">
                <i class="fa-regular fa-clipboard"></i> 전사 게시판</a>
            <a href="messenger.html" class="nav-item badge-container">
                <i class="fa-solid fa-comment-dots"></i> 사내 메신저 
                <span class="badge">3</span>
            </a>
            <a href="document.html" class="nav-item">
                <i class="fa-regular fa-folder-open"></i> 문서 관리</a>
            <a href="approval.html" class="nav-item">
                <i class="fa-solid fa-file-signature"></i> 전자결재</a>
            <a href="security.html" class="nav-item nav-admin-only">
                <i class="fa-solid fa-shield-halved"></i> 시스템 보안</a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-info">
                <img src="https://ui-avatars.com/api/?name=CEO&background=0D8ABC&color=fff&rounded=true&bold=true" alt="User" class="avatar">
                <div class="details">
                    <span class="name">진양우 (001)</span>
                    <span class="role">대표이사 (마스터)</span>
                </div>
            </div>
            <button class="logout-btn" onclick="localStorage.removeItem('isLoggedIn'); localStorage.removeItem('currentUser'); window.location.href='login.html';"><i class="fa-solid fa-right-from-bracket"></i></button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Header Minimal -->
        <header class="top-header">
            <div class="header-title">
                <h1>전사 통용 게시판</h1>
                <p>공지사항, 업무자료, 자유게시판 등 전사 소통 공간</p>
            </div>
            <div class="header-actions">
                <button class="theme-toggle" id="themeToggle" title="테마 변경">
                    <i class="fa-solid fa-sun"></i>
                </button>
            </div>
        </header>

        <div class="dashboard-container" style="flex:1;">
            
            <div class="board-layout glassmorphism">
                
                <!-- Board Toolbar -->
                <div class="board-toolbar">
                    <div class="b-categories">
                        <button class="b-cat-btn active" data-cat="전체">전체 글</button>
                        <button class="b-cat-btn" data-cat="공지사항">공지사항</button>
                        <button class="b-cat-btn" data-cat="업무자료">업무자료</button>
                        <button class="b-cat-btn" data-cat="자유게시판">자유게시판</button>
                    </div>

                    <div class="b-actions">
                        <div class="search-box">
                            <i class="fa-solid fa-magnifying-glass"></i>
                            <input type="text" id="boardSearchInput" placeholder="제목 + 내용 검색">
                        </div>
                        <button class="btn-primary" id="btnWritePost"><i class="fa-solid fa-pen"></i> 새 글 쓰기</button>
                    </div>
                </div>

                <!-- Board Table -->
                <div class="board-table-container">
                    <table class="board-table">
                        <thead>
                            <tr>
                                <th width="80" class="text-center">번호</th>
                                <th width="120" class="text-center">분류</th>
                                <th>제목</th>
                                <th width="150" class="text-center">작성자</th>
                                <th width="120" class="text-center">등록일</th>
                                <th width="80" class="text-center">조회수</th>
                            </tr>
                        </thead>
                        <tbody id="boardTableBody">
                            <!-- JS에서 동적 렌더링 -->
                        </tbody>
                    </table>
                </div>

                <!-- Paging -->
                <div class="b-pagination" id="boardPagination">
                    <!-- JS에서 동적 생성 -->
                </div>

            </div>
        </div>
    </main>

    <!-- Modal: Write / Edit Post -->
    <div class="modal-overlay" id="writeModal">
        <div class="modal-content glassmorphism" style="width: 760px; max-width: 95%; max-height: 92vh;">
            <div class="modal-header">
                <h2 id="writeModalTitle"><i class="fa-solid fa-pen-nib"></i> 새 글 쓰기</h2>
                <button class="btn-close" id="closeWriteModal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body" style="padding: 24px 30px;">
                <div style="display:flex; gap:20px; margin-bottom:20px;">
                    <div style="flex:1;">
                        <label class="form-label">분류</label>
                        <select id="writeCategory" class="board-form-control">
                            <option value="공지사항">공지사항</option>
                            <option value="업무자료">업무자료</option>
                            <option value="자유게시판" selected>자유게시판</option>
                        </select>
                    </div>
                    <div style="flex:1;">
                        <label class="form-label">상단 고정</label>
                        <select id="writePinned" class="board-form-control">
                            <option value="false">일반 글</option>
                            <option value="true">상단 고정 📌</option>
                        </select>
                    </div>
                </div>
                <div style="margin-bottom:20px;">
                    <label class="form-label">제목</label>
                    <input type="text" id="writeTitle" class="board-form-control" placeholder="제목을 입력하세요">
                </div>
                <div style="margin-bottom:20px;">
                    <label class="form-label">내용</label>
                    <textarea id="writeContent" class="board-form-control" rows="12" placeholder="내용을 입력하세요. 줄바꿈은 자동으로 적용됩니다." style="resize:vertical; min-height:200px;"></textarea>
                </div>
            </div>
            <div class="modal-footer" style="padding:16px 30px; border-top:1px solid var(--border-color); display:flex; justify-content:flex-end; gap:10px;">
                <button class="btn-secondary" id="cancelWriteBtn">취소</button>
                <button class="btn-primary" id="submitWriteBtn"><i class="fa-solid fa-paper-plane"></i> 등록</button>
            </div>
        </div>
    </div>

    <!-- Modal: View Post Detail -->
    <div class="modal-overlay" id="postModal">
        <div class="modal-content glassmorphism" style="width: 800px; max-width: 95%; max-height: 92vh;">
            <div class="modal-header">
                <h2 id="postModalCategory">게시글 상세</h2>
                <div style="display:flex; gap:8px; align-items:center;">
                    <button class="btn-edit-post" id="btnEditPost" style="display:none;" title="수정"><i class="fa-solid fa-pen-to-square"></i></button>
                    <button class="btn-delete-post" id="btnDeletePost" style="display:none;" title="삭제"><i class="fa-solid fa-trash-can"></i></button>
                    <button class="btn-close" id="closePostModal"><i class="fa-solid fa-xmark"></i></button>
                </div>
            </div>
            
            <div class="modal-body post-view-area" style="overflow-y:auto;">
                <div class="post-header">
                    <h1 class="post-title" id="postViewTitle"></h1>
                    <div class="post-meta">
                        <div class="p-author" id="postViewAuthor"></div>
                        <div class="p-details" id="postViewMeta"></div>
                    </div>
                </div>

                <div class="post-content" id="postViewContent"></div>

                <div class="post-comments">
                    <h4 id="commentCount">댓글 (0)</h4>
                    <div id="commentList" class="comment-list-area"></div>
                    <div class="comment-input-area">
                        <input type="text" id="commentInput" placeholder="댓글을 남겨보세요. (타인을 존중하는 사내 문화를 만듭시다)">
                        <button class="btn-secondary" id="btnAddComment">등록</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Custom View logic -->
    <script src="cloud_sync.js?v=1"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="socket_client.js?v=1"></script>
    <script src="app.js?v=9"></script>
    <script src="board.js?v=2"></script>
</body>
</html>
