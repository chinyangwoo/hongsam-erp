        <nav class="nav-menu">
            <div class="nav-section">MAIN</div>
            <a href="index.html" class="nav-item">
                <i class="fa-solid fa-chart-pie"></i> 통합 대시보드</a>
            <a href="traffic.html" class="nav-item">
                <i class="fa-solid fa-video"></i> 트래픽 모니터링</a>
            <a href="hr.html" class="nav-item">
                <i class="fa-solid fa-users"></i> HR/근태 관리</a>
            <a href="sales.html" class="nav-item">
                <i class="fa-regular fa-calendar-check"></i> 영업관리</a>
            <a href="crm.html" class="nav-item">

            <a href="reservation.html" class="nav-item">

            <a href="accounting.html" class="nav-item">
                <i class="fa-solid fa-calculator"></i> 회계/재무</a>
            <a href="inventory.html" class="nav-item">
                <i class="fa-solid fa-box-open"></i> 재고관리</a>
            <a href="facility.html" class="nav-item">
                <i class="fa-solid fa-building"></i> 시설현황</a>
            <a href="simulation.html" class="nav-item">
                <i class="fa-solid fa-chart-bar"></i> 경영시뮬레이션</a>            
            <div class="nav-section">MONITORING & COMM</div>
            <a href="board.html" class="nav-item">
                <i class="fa-regular fa-clipboard"></i> 전사 게시판</a>
            <a href="messenger.html" class="nav-item active badge-container">

        </nav>

        <div class="sidebar-footer">
            <div class="user-info">
                <img src="https://ui-avatars.com/api/?name=CEO&background=0D8ABC&color=fff&rounded=true&bold=true" alt="User" class="avatar">
                <div class="details">
                    <span class="name">진양우 (001)</span>
                    <span class="role">대표이사 (마스터)</span>
                </div>
            </div>
            <button class="logout-btn" onclick="localStorage.removeItem('isLoggedIn'); localStorage.removeItem('currentUser'); window.location.href='login.html';"><i class="fa-solid fa-right-from-bracket"></i></button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content chat-layout-wrapper">
        <header class="top-header" style="border-bottom: none; height: 60px;">
            <div class="header-title">
                <h1>사내 메신저</h1>
            </div>
            <div class="header-actions">
                <button class="theme-toggle" id="themeToggle" title="테마 변경">
                    <i class="fa-solid fa-sun"></i>
                </button>
            </div>
        </header>

        <div class="messenger-container glassmorphism">
            
            <!-- Left Pane: Channels & DMs -->
            <div class="chat-sidebar">
                <div class="chat-search">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="msgSearchInput" placeholder="직원 또는 대화방 검색">
                </div>

                <div class="chat-groups scroll-area">
                    <!-- Group Channels (Dynamic) -->
                    <div class="chat-sec-title">
                        <span><i class="fa-solid fa-layer-group"></i> 그룹채널</span>
                        <button class="btn-new-dm" id="btnCreateGroup" title="새 채널 만들기"><i class="fa-solid fa-plus"></i></button>
                    </div>
                    <ul class="channel-list" id="channelListEl">
                        <!-- Dynamic rendering by messenger.js -->
                    </ul>

                    <!-- Direct Messages -->
                    <div class="chat-sec-title" style="margin-top: 20px;">
                        <span><i class="fa-solid fa-user-group"></i> 1:1 메시지 (DM)</span>
                    </div>
                    <ul class="dm-list" id="messengerDmList">
                        <!-- Dynamic rendering by messenger.js -->
                    </ul>
                </div>
            </div>

            <!-- Right Pane: Active Chat Window -->
            <div class="chat-window">
                
                <!-- Chat Window Header -->
                <div class="chat-header">
                    <div class="ch-header-info">
                        <h2><i class="fa-solid fa-headset" style="margin-right:8px; color:var(--accent-blue);"></i>지원팀방</h2>
                        <span class="ch-member-count"><i class="fa-solid fa-users"></i> 그룹 채널</span>
                    </div>
                    <div class="ch-header-tools">
                        <button class="btn-icon" title="통화"><i class="fa-solid fa-phone"></i></button>
                        <button class="btn-icon" title="파일함"><i class="fa-solid fa-folder-open"></i></button>
                        <button class="btn-icon" title="설정"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                    </div>
                </div>

                <!-- Chat Messages Area -->
                <div class="chat-messages" id="chatMessagesArea">
                    <div class="chat-empty-state">
                        <i class="fa-regular fa-comment-dots"></i>
                        <p>아직 대화 내용이 없습니다.</p>
                        <span>첫 메시지를 보내보세요!</span>
                    </div>
                </div>

                <!-- Chat Input Area -->
                <div class="chat-input-area">
                    <div class="chat-toolbar">
                        <button title="파일 첨부"><i class="fa-solid fa-paperclip"></i></button>
                        <button title="이모티콘"><i class="fa-regular fa-face-smile"></i></button>
                        <div class="broadcast-toggle" title="대표이사/마스터 전용 기능">
                            <input type="checkbox" id="checkBroadcast">
                            <label for="checkBroadcast"><i class="fa-solid fa-bullhorn"></i> 전체 공지 (Broadcast)</label>
                        </div>
                    </div>
                    <div class="chat-input-wrapper">
                        <textarea id="chatInput" placeholder="메시지를 입력하세요. (Enter를 누르면 전송, Shift+Enter는 줄바꿈)" rows="1"></textarea>
                        <button class="btn-send" id="btnSendMsg"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Group Create Modal -->
    <div class="msg-modal-overlay" id="createGroupModal">
        <div class="msg-modal-content">
            <div class="msg-modal-header">
                <h2><i class="fa-solid fa-users-line" style="color:#3B82F6; margin-right:8px;"></i>새 그룹채널 만들기</h2>
                <button style="background:none; border:none; color:#94A3B8; cursor:pointer; font-size:1.1rem;" data-close-modal="createGroupModal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="msg-modal-body">
                <div class="msg-form-group">
                    <label>채널 이름</label>
                    <input type="text" id="fGroupName" placeholder="예: 프로젝트A 회의방">
                </div>
            </div>
            <div class="msg-modal-footer">
                <button class="msg-btn-secondary" data-close-modal="createGroupModal">취소</button>
                <button class="msg-btn-primary" id="btnSaveGroup"><i class="fa-solid fa-plus" style="margin-right:4px;"></i>생성</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="msgToast"></div>

    <!-- Scripts -->
    <script src="cloud_sync.js?v=1"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="socket_client.js?v=1"></script>
    <script src="app.js?v=10"></script>
    <script src="messenger.js?v=3"></script>
</body>
</html>
